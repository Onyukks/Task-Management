# Render blueprint for the Go backend.
# Render → New → Blueprint → pick this repo. It builds backend/Dockerfile.
# Set DATABASE_URL (Neon) and FRONTEND_ORIGIN (your Vercel URL) in the dashboard.
services:
  - type: web
    name: tasks-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    region: oregon
    healthCheckPath: /healthz
    envVars:
      # Paste the Neon POOLED connection string (must include ?sslmode=require).
      - key: DATABASE_URL
        sync: false
      # Generated once by Render; rotate by changing it in the dashboard.
      - key: JWT_SECRET
        generateValue: true
      # Your deployed Vercel URL, e.g. https://tasks-app.vercel.app (no trailing slash).
      - key: FRONTEND_ORIGIN
        sync: false
      # Enables Secure + SameSite=None on the auth cookie for cross-site use.
      - key: APP_ENV
        value: production
      # Optional: seed a demo admin so reviewers can try the admin view.
      # Set both in the dashboard to enable (otherwise admin must be set via SQL).
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      # Render injects PORT automatically; the server reads it.
