# One-command local stack: Postgres + Go API + Next.js frontend.
#
#   docker compose up --build
#
# Frontend -> http://localhost:3000
# API      -> http://localhost:8080

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tasks
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/tasks?sslmode=disable
      JWT_SECRET: local-development-secret-at-least-32-characters
      FRONTEND_ORIGIN: http://localhost:3000
      PORT: "8080"
      APP_ENV: development
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./frontend
    environment:
      # Browser-side calls hit the API on localhost (host network port mapping).
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  db_data:
